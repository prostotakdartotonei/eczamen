<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
      <img id="sliderImage" src="assets/67be0e9604c2fe619a95ca87.jpg" alt="slide">
      <button class="slider-nav prev" onclick="prevSlide()">Назад</button>
      <button class="slider-nav next" onclick="nextSlide()">Вперед</button>
    </div>
  </div>
  <footer class="footer">
    <h3>Наше местонахождение: 
        Адрес головного офиса: г. Москва, ул. Большая Ордынка, д. 15 
        Телефон горячей линии: +7 (495) 123-45-67 
        Если возникли вопросы или пожелания, позвоните нам. Ответим оперативно 
        и подробно.
    </h1>
  </footer>
  <script>
    const images = [
        'assets/67be0e9604c2fe619a95ca87.jpg',
        'assets/5946dd94900ba9b56b0d52c88fff9d0d.jpg',
        'assets/sNP7I-h35CvIJxmvNQiERhJRx-YhipQKfCK4rtz.jpg',
        'assets/1498802745470_bulletin.jpg'
    ];
    let currentSlide = 0;
    const sliderImage = document.getElementById('sliderImage');

    function showSlide(index) {
      currentSlide = (index + images.length) % images.length;
      sliderImage.src = images[currentSlide];
    }

    function nextSlide() {
      showSlide(currentSlide + 1);
    }

    function prevSlide() {
      showSlide(currentSlide - 1);
    }

    setInterval(nextSlide, 3000);
  </script>
</body>
</html>
